# Anamnesis Backend — Isolated test environment
# Usage: docker-compose -f docker-compose.test.yml up -d
# Then: pytest (with DATABASE_URL and REDIS_URL pointing to these services)

version: "3.9"

services:
  postgres_test:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: anamnesis_test
      POSTGRES_PASSWORD: anamnesis_test
      POSTGRES_DB: anamnesis_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data

  redis_test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    tmpfs:
      - /data
