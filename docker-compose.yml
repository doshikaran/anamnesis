# Anamnesis Backend — Local development / production-style
# Usage: docker-compose up -d && curl http://localhost:8000/health

version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: anamnesis
      POSTGRES_PASSWORD: anamnesis_dev
      POSTGRES_DB: anamnesis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anamnesis -d anamnesis"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://anamnesis:anamnesis_dev@postgres:5432/anamnesis
      REDIS_URL: redis://redis:6379/0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://anamnesis:anamnesis_dev@postgres:5432/anamnesis
      REDIS_URL: redis://redis:6379/0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.beat
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://anamnesis:anamnesis_dev@postgres:5432/anamnesis
      REDIS_URL: redis://redis:6379/0
    restart: unless-stopped
    depends_on:
      - worker
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
