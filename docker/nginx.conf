# Anamnesis — nginx reverse proxy for API
# Upstream: keepalive for connection reuse
upstream api {
    server api:8000;
    keepalive 32;
}

# Rate limit zone: 30 requests/minute per IP as backup to app-level limits
limit_req_zone $binary_remote_addr zone=api_backup:10m rate=30r/m;

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip for JSON
    gzip on;
    gzip_types application/json;
    gzip_min_length 256;

    # Backup rate limit (nginx-level)
    limit_req zone=api_backup burst=5 nodelay;

    # API: general routes — standard proxy
    location /api/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 10M;
    }

    # SSE endpoint: must disable buffering or streaming breaks
    location /api/queries {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        client_max_body_size 10M;
    }

    # Health check (no rate limit)
    location /health {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
}
